<meta http-equiv="X-UA-Compatible" content="IE=edge">

<!-- SEO, Open Graph, Twitter Card, and JSON-LD -->
{{ partial "basic-seo.html" . }}

<!-- Favicon -->
<link rel="icon" type="image/x-icon" href="/favicon.ico">

<!-- Dark Mode Script (runs before page load to prevent flash) -->
<script>
    // Apply saved mode when valid, otherwise default to auto (system preference).
    const savedTheme = localStorage.getItem('theme');
    const mode = savedTheme === 'dark' || savedTheme === 'light' || savedTheme === 'auto'
        ? savedTheme
        : 'auto';
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const shouldUseDark = mode === 'dark' || (mode === 'auto' && prefersDark);

    if (shouldUseDark) {
        document.documentElement.classList.add('dark');
    }
</script>

<!-- Preload critical resources for accessibility -->
<link rel="preconnect" href="{{ .Site.BaseURL }}">

<!-- Accessibility: Reduce motion for users who prefer it -->
<style>
    @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
            animation-duration: 0.01ms !important;
            animation-iteration-count: 1 !important;
            transition-duration: 0.01ms !important;
        }
    }
</style>
