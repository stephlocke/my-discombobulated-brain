            </a>
            {{ else }}

</header>

<script>
    // Theme toggle functionality
    const THEME_MODES = ['auto', 'dark', 'light'];
    const themeToggle = document.getElementById('theme-toggle');
    const mobileThemeToggle = document.getElementById('mobile-theme-toggle');
    const mobileThemeText = document.getElementById('mobile-theme-text');
    const autoIcon = document.getElementById('theme-toggle-auto-icon');
    const darkIcon = document.getElementById('theme-toggle-dark-icon');
    const lightIcon = document.getElementById('theme-toggle-light-icon');
    const html = document.documentElement;
    const systemThemeQuery = window.matchMedia('(prefers-color-scheme: dark)');

    function getThemeMode() {
        const savedTheme = localStorage.getItem('theme');
        /*  return THEME_MODES.includes(savedTheme) ? savedTheme : 'auto';  */
        /* theme locked to light mode for now, as dark mode is not fully implemented yet */
        return THEME_MODES.includes('light');
    }

    function isDarkForMode(mode) {
        return mode === 'dark' || (mode === 'auto' && systemThemeQuery.matches);
    }

    function applyTheme(mode) {
        html.classList.toggle('dark', isDarkForMode(mode));
    }

    function applySystemThemeIfAuto() {
        if (getThemeMode() !== 'auto') {
            return;
        }

        applyTheme('auto');
        updateThemeUI();
    }

    function getNextMode(currentMode) {
        const currentIndex = THEME_MODES.indexOf(currentMode);
        return THEME_MODES[(currentIndex + 1) % THEME_MODES.length];
    }

    function updateThemeUI() {
        const mode = getThemeMode();
        const nextMode = getNextMode(mode);

        if (autoIcon) {
            autoIcon.classList.toggle('hidden', mode !== 'auto');
        }

        if (darkIcon) {
            darkIcon.classList.toggle('hidden', mode !== 'dark');
        }

        if (lightIcon) {
            lightIcon.classList.toggle('hidden', mode !== 'light');
        }

        if (themeToggle) {
            themeToggle.setAttribute('aria-pressed', mode === 'dark' ? 'true' : 'false');
            themeToggle.setAttribute('aria-label', 'Theme: ' + mode + '. Click to switch to ' + nextMode + '.');
            themeToggle.setAttribute('title', 'Theme: ' + mode + ' (next: ' + nextMode + ')');
        }

        if (mobileThemeText) {
            mobileThemeText.textContent = 'Theme: ' + mode + ' (tap for ' + nextMode + ')';
        }
    }

    // Sync initial state from stored mode.
    applyTheme(getThemeMode());
    updateThemeUI();

    function cycleThemeMode() {
        const nextMode = getNextMode(getThemeMode());
        localStorage.setItem('theme', nextMode);
        applyTheme(nextMode);
        updateThemeUI();
    }

    if (themeToggle) {
        themeToggle.addEventListener('click', cycleThemeMode);
    }

    if (mobileThemeToggle) {
        mobileThemeToggle.addEventListener('click', cycleThemeMode);
    }

    // Follow system theme only until the user manually picks a theme.
    if (typeof systemThemeQuery.addEventListener === 'function') {
        systemThemeQuery.addEventListener('change', applySystemThemeIfAuto);
    } else if (typeof systemThemeQuery.addListener === 'function') {
        systemThemeQuery.addListener(applySystemThemeIfAuto);
    }
    
    // Mobile menu toggle
    const mobileMenuButton = document.getElementById('mobile-menu-button');
    const mobileMenu = document.getElementById('mobile-menu');
    
    if (mobileMenuButton && mobileMenu) {
        mobileMenuButton.addEventListener('click', () => {
            const isExpanded = mobileMenuButton.getAttribute('aria-expanded') === 'true';
            mobileMenuButton.setAttribute('aria-expanded', String(!isExpanded));
            mobileMenu.classList.toggle('hidden');
        });
    }

    // Make the sticky navbar slightly thinner after scrolling.
    const siteHeader = document.getElementById('site-header');
    const siteNav = document.getElementById('site-nav');
    const siteLogo = document.getElementById('site-logo');
    let isHeaderCompact = false;

    function setHeaderCompactState(nextIsCompact) {
        if (isHeaderCompact === nextIsCompact) {
            return;
        }

        isHeaderCompact = nextIsCompact;

        if (siteHeader) {
            siteHeader.classList.toggle('is-compact', isHeaderCompact);
        }

        if (siteNav) {
            siteNav.classList.toggle('py-4', !isHeaderCompact);
            siteNav.classList.toggle('py-2', isHeaderCompact);
        }

        if (siteLogo) {
            siteLogo.classList.toggle('h-12', !isHeaderCompact);
            siteLogo.classList.toggle('h-10', isHeaderCompact);
        }
    }

    function updateHeaderOnScroll() {
        const scrollY = window.scrollY;

        if (!isHeaderCompact && scrollY > 24) {
            setHeaderCompactState(true);
        } else if (isHeaderCompact && scrollY < 8) {
            setHeaderCompactState(false);
        }
    }

    setHeaderCompactState(window.scrollY > 24);
    updateHeaderOnScroll();
    window.addEventListener('scroll', updateHeaderOnScroll, { passive: true });
</script>
