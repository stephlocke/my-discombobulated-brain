<button
    id="back-to-top"
    type="button"
    class="group fixed right-6 bottom-6 z-50 inline-flex h-12 w-12 cursor-pointer items-center justify-center overflow-hidden rounded-full bg-primary text-white shadow-lg transition-all duration-300 hover:w-40 hover:bg-primary-darken focus:outline-none focus:ring-2 focus:ring-secondary focus:ring-offset-2 focus:ring-offset-white dark:bg-dark-primary dark:hover:bg-dark-primary-darken dark:focus:ring-offset-gray-900"
    aria-label="Back to top">
    <svg class="absolute left-1/2 size-5 -translate-x-1/2 transition-all duration-300 group-hover:left-4 group-hover:translate-x-0 group-focus-visible:left-4 group-focus-visible:translate-x-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path>
    </svg>
    <span class="absolute left-10 whitespace-nowrap text-sm font-semibold opacity-0 transition-all duration-300 group-hover:opacity-100 group-focus-visible:opacity-100">
        Back to top
    </span>
</button>

<script>
    (() => {
        const backToTopButton = document.getElementById('back-to-top');

        if (!backToTopButton) {
            return;
        }

        backToTopButton.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    })();
</script>
