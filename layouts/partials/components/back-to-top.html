<button
    id="back-to-top"
    type="button"
    class="group fixed right-6 bottom-6 z-50 inline-flex h-12 w-12 cursor-pointer items-center justify-center overflow-hidden {{ partial "components/edge-rounding" (dict "shape" "button") }} bg-primary text-inverse shadow-lg transition-all duration-300 md:hover:w-40 hover:bg-primary-darken focus:outline-none focus:ring-2 focus:ring-secondary focus:ring-offset-2 focus:ring-offset-surface"
    aria-label="Back to top">
    <svg class="absolute left-1/2 size-5 -translate-x-1/2 transition-all duration-300 md:group-hover:left-4 md:group-hover:translate-x-0 md:group-focus-visible:left-4 md:group-focus-visible:translate-x-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path>
    </svg>
    <span class="absolute left-10 right-4 text-center whitespace-nowrap text-sm font-semibold text-inverse opacity-0 transition-all duration-300 md:group-hover:opacity-100 md:group-focus-visible:opacity-100" aria-hidden="true">
        Back to top
    </span>
</button>

{{- with resources.Get "js/back-to-top.js" -}}
<script src="{{ .RelPermalink }}"></script>
{{- end -}}
