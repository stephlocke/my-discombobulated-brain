{{- $buttonRounding := partial "components/edge-rounding" (dict "shape" "button") -}}
{{- $cardRounding := partial "components/edge-rounding" (dict "shape" "card-compact") -}}

<!-- Desktop Search Bar -->
<div id="desktop-search-bar" class="hidden bg-surface border-b border-primary-darken/20 shadow-sm">
    <div class="container max-w-[85%] py-3">

        <form id="desktop-search-form" role="search" action='{{ "search/" | relLangURL }}' method="get" class="flex gap-2">
            <label for="desktop-search-input" class="sr-only">Search</label>
            <input
                type="search"
                id="desktop-search-input"
                name="q"
                placeholder="Search…"
                class="flex-1 min-h-11 px-4 py-2 {{ $buttonRounding }} bg-white border-2 border-primary/20 text-off-black placeholder:text-subtle focus:outline-none focus:ring-2 focus:ring-secondary focus:ring-offset-2 focus:border-primary text-sm"
                autocomplete="off"
            >
            <button
                type="submit"
                id="desktop-search-submit"
                class="inline-flex cursor-pointer items-center justify-center min-h-11 min-w-11 p-2 bg-primary text-white {{ $buttonRounding }} hover:bg-primary-darken focus:outline-none focus:ring-2 focus:ring-secondary focus:ring-offset-2 focus:ring-offset-primary transition"
                aria-label="Submit search"
            >
                {{ partial "components/icon" (dict "name" "search" "class" "h-5 w-5") }}
            </button>
        </form>
        <div id="desktop-search-results" class="mt-3 max-h-96 overflow-y-auto hidden">
            <ul id="desktop-search-results-list" class="space-y-2 p-2" role="list"></ul>
        </div>
        <p id="desktop-search-status" role="status" class="text-sm text-off-black/60 mt-2 hidden"></p>
    </div>
</div>

<script>
(function () {
    const indexUrl = '{{ "index.json" | relLangURL }}';
    const cardRounding = '{{ $cardRounding }}';
    let searchIndex = null;
    let searchTimeout = null;

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str || '';
        return div.innerHTML;
    }

    function highlightTerms(html, terms, limit) {
        const temp = document.createElement('div');
        temp.innerHTML = html || '';
        const text = (temp.textContent || temp.innerText || '').replace(/\s+/g, ' ').trim();
        const lowercaseText = text.toLowerCase();
        let snippetStart = 0;
        let matchLength = 0;
        let firstMatchIndex = -1;

        terms.forEach(function (term) {
            const currentIndex = lowercaseText.indexOf(term.toLowerCase());
            if (currentIndex !== -1 && (firstMatchIndex === -1 || currentIndex < firstMatchIndex)) {
                firstMatchIndex = currentIndex;
                matchLength = term.length;
            }
        });

        if (firstMatchIndex !== -1 && text.length > limit) {
            const availableContext = Math.max(limit - matchLength, 0);
            const contextBefore = Math.floor(availableContext / 2);
            snippetStart = Math.max(0, firstMatchIndex - contextBefore);

            if (snippetStart + limit > text.length) {
                snippetStart = Math.max(0, text.length - limit);
            }
        }

        const snippetEnd = Math.min(text.length, snippetStart + limit);
        const hasLeadingText = snippetStart > 0;
        const hasTrailingText = snippetEnd < text.length;
        const truncated = (hasLeadingText ? '\u2026' : '') + text.slice(snippetStart, snippetEnd).trim() + (hasTrailingText ? '\u2026' : '');
        
        // Highlight matching terms (case-insensitive)
        let highlighted = escapeHtml(truncated);
        terms.forEach(function(term) {
            const regex = new RegExp('(' + term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
            highlighted = highlighted.replace(regex, '<span class="search-term-highlight">$1</span>');
        });
        
        return highlighted;
    }

    function renderResult(item, terms) {
        const li = document.createElement('li');
        li.innerHTML =
            '<a href="' + escapeHtml(item.url) + '" ' +
                'class="block bg-white border border-primary/20 p-3 ' + cardRounding + ' hover:border-primary hover:bg-primary/5 focus:outline-none focus:ring-2 focus:ring-secondary focus:ring-offset-2 focus:ring-offset-primary text-sm transition">' +
                '<p class="font-semibold text-primary hover:underline hover:underline-offset-2 line-clamp-1">' + highlightTerms(item.title, terms, 999) + '</p>' +
                ((item.content || item.summary) ? '<p class="text-off-black text-xs mt-1">' + highlightTerms(item.content || item.summary, terms, 100) + '</p>' : '') +
            '</a>';
        return li;
    }

    async function loadIndex() {
        if (searchIndex) return searchIndex;
        try {
            const response = await fetch(indexUrl);
            if (!response.ok) throw new Error('index unavailable');
            searchIndex = await response.json();
            return searchIndex;
        } catch (e) {
            console.error('Failed to load search index:', e);
            return null;
        }
    }

    async function performSearch(query) {
        const searchInput = document.getElementById('desktop-search-input');
        const resultsList = document.getElementById('desktop-search-results-list');
        const resultsContainer = document.getElementById('desktop-search-results');
        const statusText = document.getElementById('desktop-search-status');

        if (!query.trim()) {
            resultsContainer.classList.add('hidden');
            statusText.classList.add('hidden');
            resultsList.innerHTML = '';
            return;
        }

        const index = await loadIndex();
        if (!index) {
            statusText.textContent = 'Search is temporarily unavailable.';
            statusText.classList.remove('hidden');
            resultsContainer.classList.add('hidden');
            return;
        }

        const q = query.toLowerCase().trim();
        const terms = q.split(/\s+/).filter(Boolean);

        const results = index.filter(function (item) {
            if (!item._haystack) {
                item._haystack = [
                    item.title || '',
                    item.summary || '',
                    item.content || '',
                    (item.tags || []).join(' ')
                ].join(' ').toLowerCase();
            }
            return terms.every(function (term) { return item._haystack.includes(term); });
        });

        resultsList.innerHTML = '';

        if (results.length === 0) {
            statusText.textContent = 'No results for "' + escapeHtml(query) + '"';
            statusText.classList.remove('hidden');
            resultsContainer.classList.add('hidden');
            return;
        }

        statusText.textContent = results.length + ' result' + (results.length !== 1 ? 's' : '') + ' for "' + escapeHtml(query) + '"';
        statusText.classList.remove('hidden');

        results.slice(0, 5).forEach(function (item) {
            resultsList.appendChild(renderResult(item, terms));
        });

        resultsContainer.classList.remove('hidden');
    }


    function initSearchBar() {
        const searchInput = document.getElementById('desktop-search-input');
        const searchForm = document.getElementById('desktop-search-form');
        const resultsContainer = document.getElementById('desktop-search-results');
        const searchBar = document.getElementById('desktop-search-bar');
        const searchToggleButton = document.getElementById('navbar-search-toggle');

        if (!searchInput) return;

        // Toggle search bar visibility
        if (searchToggleButton && searchBar) {
            searchToggleButton.addEventListener('click', function (e) {
                e.preventDefault();
                searchBar.classList.toggle('hidden', !searchBar.classList.contains('hidden'));
                // Focus the input when opening
                if (!searchBar.classList.contains('hidden')) {
                    searchInput.focus();
                }
            });
        }

        // Auto-execute search as user types
        searchInput.addEventListener('input', function () {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                performSearch(this.value);
            }, 200);
        });

        // Handle form submission
        searchForm.addEventListener('submit', function (e) {
            e.preventDefault();
            const query = searchInput.value.trim();
            if (query) {
                window.location.href = '{{ "search/" | relLangURL }}?q=' + encodeURIComponent(query);
            }
        });

        // Hide the entire search bar when clicking outside
        document.addEventListener('click', function (e) {
            if (!e.target.closest('#desktop-search-bar') && !e.target.closest('#navbar-search-toggle')) {
                searchBar.classList.add('hidden');
                resultsContainer.classList.add('hidden');
            }
        });

        // Allow navigation with keyboard
        searchInput.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') {
                resultsContainer.classList.add('hidden');
                searchBar.classList.add('hidden');
            }
        });
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initSearchBar);
    } else {
        initSearchBar();
    }
})();
</script>
