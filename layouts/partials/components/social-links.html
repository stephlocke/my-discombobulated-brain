<h4 class="sr-only">Social Media Links</h4>
<nav aria-label="Social media links" class="mt-3 flex items-center space-x-4">
    {{- range .Site.Params.socials }}<a href="{{ .url }}" target="_blank" rel="noopener noreferrer" class="text-muted hover:text-primary focus:outline-none focus:ring-2 focus:ring-primary rounded" aria-label="Follow us on {{ .label }}">{{ partial "components/icon" (dict "name" .icon "class" "h-5 w-5") }}</a>{{- end }}
</nav>
