<article class="bg-gray-50 dark:bg-gray-800 p-6 rounded-lg">
    <div class="w-12 h-12 bg-{{ .icon_color }}-100 dark:bg-{{ .icon_color }}-400 rounded-lg flex items-center justify-center mb-4 mx-auto" aria-hidden="true">
        <span>
            <i class="fas fa-solid fa-{{ .icon }} fa-lg text-{{ .icon_color }}-500 dark:text-{{ .icon_color }}-800"></i>
        </span>
    </div>
    <h3 class="text-xl font-semibold text-off-black dark:text-white mb-3">{{ .header }}</h3>
    <p class="text-gray-600 dark:text-gray-400 mb-8">
        {{ .text }}
    </p>
    {{ partial "components/button" (dict "type" "outline" "href" (printf "#%s" (lower .header)) "label" "Read more") }}
</article>
