<article class="event-card bg-white shadow hover:shadow-lg transition-shadow overflow-hidden rounded-[3rem] p-6 focus-within:ring-2 focus-within:ring-primary">
    <div class="w-12 h-12 bg-{{ .icon_color }}-100 .icon_color }}-400 rounded-full flex items-center justify-center mb-4 mx-auto" aria-hidden="true">
        <span>
            <i class="fas fa-solid {{ .icon }} fa-lg text-{{ .icon_color }}-500 .icon_color }}-800"></i>
        </span>
    </div>
    <h3 class="text-xl font-semibold mb-2 text-primary">{{ .header }}</h3>
    <p class="text-text mb-6 text-sm line-clamp-3">
        {{ .text }}
    </p>
    {{ partial "components/button" (dict "type" "capsule" "href" (or .href (printf "#%s" (lower .header))) "label" "Read more") }}
</article>
