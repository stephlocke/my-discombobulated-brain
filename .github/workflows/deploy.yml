name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow pushing to the gh-pages branch
permissions:
  contents: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

# Default to bash
defaults:
  run:
    shell: bash

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Read Hugo config
        id: hugo-config
        run: |
          python3 - <<'PY'
          import os
          import tomllib

          with open("config.toml", "rb") as config_file:
              config = tomllib.load(config_file)

          hugo_config = config.get("params", {}).get("hugo", {})
          version = hugo_config.get("version")
          extended = hugo_config.get("extended")

          if not isinstance(version, str) or not version.strip():
              raise SystemExit("config.toml params.hugo.version must be a non-empty string")
          if not isinstance(extended, bool):
              raise SystemExit("config.toml params.hugo.extended must be true or false")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as github_output:
              github_output.write(f"version={version.strip()}\n")
              github_output.write(f"extended={'true' if extended else 'false'}\n")
          PY

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ steps.hugo-config.outputs.version }}
          extended: ${{ steps.hugo-config.outputs.extended }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
        run: |
          hugo \
            --gc \
            --minify

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          branch: gh-pages
          folder: public
          clean: true
          clean-exclude: |
            pr-preview
            CNAME
