name: PR Preview

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed

# Write access to push preview builds to the gh-pages branch and to post
# a comment on the pull request with the preview URL.
permissions:
  contents: write
  pull-requests: write

# Cancel any in-progress preview build for the same PR when a new push arrives,
# but allow different PRs to build concurrently.
concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  deploy-preview:
    name: Deploy PR preview
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.action != 'closed'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Read Hugo config
        id: hugo-config
        run: |
          python3 - <<'PY'
          import os
          import tomllib

          with open("config.toml", "rb") as config_file:
              config = tomllib.load(config_file)

          hugo_config = config.get("params", {}).get("hugo", {})
          version = hugo_config.get("version")
          extended = hugo_config.get("extended")

          if not isinstance(version, str) or not version.strip():
              raise SystemExit("config.toml params.hugo.version must be a non-empty string")
          if not isinstance(extended, bool):
              raise SystemExit("config.toml params.hugo.extended must be true or false")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as github_output:
              github_output.write(f"version={version.strip()}\n")
              github_output.write(f"extended={'true' if extended else 'false'}\n")
          PY

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ steps.hugo-config.outputs.version }}
          extended: ${{ steps.hugo-config.outputs.extended }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-preview/pr-${{ github.event.pull_request.number }}/"

      - name: Deploy PR preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: public
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: deploy

  remove-preview:
    name: Remove PR preview
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.action == 'closed'
    steps:
      - name: Remove PR preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: public
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: remove
