name: Netlify Deploy Preview

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: netlify-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request.head.repo.fork == false }}
    env:
      HUGO_VERSION: 0.146.6
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3.0.0
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Setup Node
        uses: actions/setup-node@v4.0.0
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build with Hugo
        run: hugo --gc --minify

      - name: Install Netlify CLI
        run: npm install --global netlify-cli

      - name: Deploy preview to Netlify
        id: netlify
        run: |
          DEPLOY_OUTPUT="$(netlify deploy --dir=public --json --alias pr-${{ github.event.pull_request.number }})"
          DEPLOY_URL="$(echo "$DEPLOY_OUTPUT" | jq -r '.deploy_url')"
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on pull request
        uses: actions/github-script@v7.0.0
        env:
          DEPLOY_URL: ${{ steps.netlify.outputs.deploy_url }}
        with:
          script: |
            const marker = '<!-- netlify-preview-comment -->';
            const body = `${marker}
            ✅ Netlify deploy preview is ready:
            ${process.env.DEPLOY_URL}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find((comment) =>
              comment.user.type === 'Bot' && comment.body.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
