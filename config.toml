baseURL = 'https://stephlocke.com/my-discombobulated-brain/'
locale = 'en-us'
title = 'Mental Health Charity'

# Pagination
[pagination]
  pagerSize = 10

# Enable emoji support
enableEmoji = true

# Enable Git info
enableGitInfo = false

# Enable RSS
enableRSS = true

# Copyright notice
copyright = '© 2026 Mental Health Charity. All rights reserved.'

# Build configuration for Tailwind CSS
[build]
  [build.buildStats]
    enable = true
  [[build.cachebusters]]
    source = 'assets/notwatching/hugo_stats\.json'
    target = 'css'
  [[build.cachebusters]]
    source = '(postcss|tailwind)\.config\.js'
    target = 'css'

[module]
  [[module.mounts]]
    source = 'assets'
    target = 'assets'
  [[module.mounts]]
    disableWatch = true
    source = 'hugo_stats.json'
    target = 'assets/notwatching/hugo_stats.json'

[params]
  description = 'A mental health charity dedicated to providing support and resources for those in need.'
  author = 'Mental Health Charity'
  keywords = ['mental health', 'charity', 'support', 'wellness', 'resources']
  logo = 'images/my-discombob-logo.svg'
  favicon = 'images/favicon.ico'
  # Should Upcoming Events be shown on the homepage?
  upcomingEventsSection = true
  # Should Working With be shown on the homepage?
  workingWithSection = true
  # Should Services be shown on the homepage?
  servicesSection = true
  # Should Awards and Recognition be shown on the homepage?
  awardsSection = true
    # Should the blog section be shown on the homepage?
  blogSection = false

  [params.style_rules]
    # Edge rounding style: sharp, curved, or round
    edges = "round"
    # Primary and secondary theme colors
    primary_color = "oklch(63.5% 0.15 158)"
    secondary_color = "var(--color-yellow-500)"
    # Font stacks (primary plus fallbacks)
    title_font = "'Exo', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    body_font = "'Exo', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
  
  # Social media
  twitter = ''
  facebook = ''
  instagram = ''
  linkedin = ''
  
  # Contact
  email = 'contact@example.org'
  phone = ''
  
  # Features
  showReadingTime = true
  showShareButtons = true
  showDateUpdated = false
  
[taxonomies]
  category = 'categories'
  tag = 'tags'

[menu]
  [[menu.main]]
    identifier = 'home'
    name = 'Home'
    url = '/'
    pageRef = '/'
    weight = 1
  
  [[menu.main]]
    identifier = 'about'
    name = 'About'
    url = '/about/'
    pageRef = '/about'
    weight = 2
  
  [[menu.main]]
    identifier = 'blog'
    name = 'Blog'
    url = '/blog/'
    pageRef = '/blog'
    weight = 3
  
  [[menu.main]]
    identifier = 'contact'
    name = 'Contact'
    url = '/contact/'
    weight = 4

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = false
    lineNos = true
    lineNumbersInTable = true
    noClasses = true
    style = 'monokai'
    tabWidth = 4

[outputs]
  home = ['HTML', 'RSS', 'JSON']
  page = ['HTML']
  section = ['HTML', 'RSS']

[sitemap]
  changefreq = 'weekly'
  filename = 'sitemap.xml'
  priority = 0.5