baseURL = 'https://stephlocke.com/my-discombobulated-brain/'
languageCode = 'en-us'
title = 'Mental Health Charity'

# Pagination
[pagination]
  pagerSize = 10

# Enable emoji support
enableEmoji = true

# Enable Git info for accurate lastmod dates in sitemap and feeds
enableGitInfo = true

# Enable RSS
enableRSS = true

# Copyright notice
copyright = '© 2026 Mental Health Charity. All rights reserved.'

# Frontmatter date resolution: Git commit time → explicit lastmod → file mod time → default
[frontmatter]
  lastmod = [':git', 'lastmod', ':fileModTime', ':default']

# Build configuration for Tailwind CSS
[build]
  [build.buildStats]
    enable = true
  [[build.cachebusters]]
    source = 'assets/notwatching/hugo_stats\.json'
    target = 'css'
  [[build.cachebusters]]
    source = '(postcss|tailwind)\.config\.js'
    target = 'css'

[module]
  [[module.mounts]]
    source = 'assets'
    target = 'assets'
  [[module.mounts]]
    disableWatch = true
    source = 'hugo_stats.json'
    target = 'assets/notwatching/hugo_stats.json'

[params]
  description = 'A mental health charity dedicated to providing support and resources for those in need.'
  author = 'Mental Health Charity'
  keywords = ['mental health', 'charity', 'support', 'wellness', 'resources']
  logo = 'images/my-discombob-logo.svg'
  favicon = 'images/favicon.ico'
  
  # Social media
  twitter = ''
  facebook = ''
  instagram = ''
  linkedin = ''
  
  # Contact
  email = 'contact@example.org'
  phone = ''
  
  # Features
  showReadingTime = true
  showShareButtons = true
  showDateUpdated = false
  
[taxonomies]
  category = 'categories'
  tag = 'tags'

[menu]
  [[menu.main]]
    identifier = 'home'
    name = 'Home'
    url = '/'
    pageRef = '/'
    weight = 1
  
  [[menu.main]]
    identifier = 'about'
    name = 'About'
    url = '/about/'
    pageRef = '/about'
    weight = 2
  
  [[menu.main]]
    identifier = 'blog'
    name = 'Blog'
    url = '/blog/'
    pageRef = '/blog'
    weight = 3
  
  [[menu.main]]
    identifier = 'contact'
    name = 'Contact'
    url = '/contact/'
    weight = 4

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = false
    lineNos = true
    lineNumbersInTable = true
    noClasses = true
    style = 'monokai'
    tabWidth = 4
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false

# Human-friendly, stable permalinks
# Note: `:slug` falls back to the content filename if no `slug` is set in frontmatter.
[permalinks]
  [permalinks.page]
    blog = '/blog/:slug/'

# Register the text/markdown media type for Markdown output format
[mediaTypes]
  [mediaTypes.'text/markdown']
    suffixes = ['md']

# Custom output formats
[outputFormats]
  [outputFormats.SearchIndex]
    mediaType = 'application/json'
    baseName = 'searchindex'
    isHTML = false
    notAlternative = true
  [outputFormats.llms]
    mediaType = 'text/plain'
    baseName = 'llms'
    isPlainText = true
    isHTML = false
    rel = 'alternate'
  [outputFormats.llmsfull]
    mediaType = 'text/plain'
    baseName = 'llms-full'
    isPlainText = true
    isHTML = false
    rel = 'alternate'
  [outputFormats.Markdown]
    mediaType = 'text/markdown'
    baseName = 'index'
    isPlainText = true
    isHTML = false
    rel = 'alternate'

[outputs]
  home    = ['HTML', 'RSS', 'SearchIndex', 'llms', 'llmsfull']
  page    = ['HTML', 'Markdown']
  section = ['HTML', 'RSS']

[sitemap]
  filename = 'sitemap.xml'

# Image processing: quality, resizing, and format conversion
[imaging]
  quality        = 82
  resampleFilter = 'Lanczos'
  [imaging.exif]
    disableDate     = false
    disableLatLong  = true
    includeFields   = ''
    excludeFields   = ''

# Resource caches: speed up repeated builds
[caches]
  [caches.images]
    dir    = ':resourceDir/_gen'
    maxAge = '720h'
  [caches.assets]
    dir    = ':resourceDir/_gen'
    maxAge = '720h'

# Minify HTML, CSS, JS, JSON, SVG, and XML in production builds
[minify]
  disableCSS  = false
  disableHTML = false
  disableJS   = false
  disableJSON = false
  disableSVG  = false
  disableXML  = false
  [minify.tdewolff]
    [minify.tdewolff.html]
      keepDefaultAttrVals = true
      keepWhitespace      = false