baseURL = 'https://stephlocke.com/my-discombobulated-brain/'
locale = 'en-GB'
title = 'My Discombobulated Brain'
# Enable emoji support
enableEmoji = true
# Enable Git info
enableGitInfo = false
# Enable RSS
enableRSS = true
# Copyright notice
copyright = '© MyDiscombobulated Brain 2026. All rights reserved.'
# Pagination
[pagination]
  pagerSize = 10

# Build configuration for Tailwind CSS
[build]
  [build.buildStats]
    enable = true
  [[build.cachebusters]]
    source = 'assets/notwatching/hugo_stats\.json'
    target = 'css'
  [[build.cachebusters]]
    source = '(postcss|tailwind)\.config\.js'
    target = 'css'

[module]
  [[module.mounts]]
    source = 'assets'
    target = 'assets'
  [[module.mounts]]
    disableWatch = true
    source = 'hugo_stats.json'
    target = 'assets/notwatching/hugo_stats.json'

[params]
  address = '123 Wellness Way, Mindful City, MC1 1CM.'
  company_number = '12345678'
  charity_number = '87654321'
  author = 'Mental Health Charity'
  keywords = ['mental health', 'charity', 'support', 'wellness', 'resources']
  logo = 'images/my-discombob-logo.svg'
  favicon = 'images/favicon.ico'
  # Should Upcoming Events be shown on the homepage?
  upcomingEventsSection = true
  # Should Working With be shown on the homepage?
  workingWithSection = true
  # Should Services be shown on the homepage?
  servicesSection = true
  # Should Awards and Recognition be shown on the homepage?
  awardsSection = true
    # Should the blog section be shown on the homepage?
  blogSection = false

  [params.about_section]
    # Used to populate the About section of the footer. Every parameter added here will be displayed in the footer.
    address = "123 Wellness Way, Mindful City, MC1 1CM"
    company = "12345678"
    charity = "87654321"

  [params.style_rules]
    # Edge rounding style: sharp, curved, or round
    edges = "round"
    # Whether the navigation bar expands vertically when the user is at the top of the page (true) or is always fixed (false)
    expanded_nav = false
    # Primary and secondary theme colors
    primary_color = "oklch(63.5% 0.15 158)"
    secondary_color = "var(--color-yellow-500)"
    # Font stacks (primary plus fallbacks)
    title_font = "'Exo', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    body_font = "'Exo', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    # What image, if any, to use as the hero image on the homepage. The image is stored in static/images, if the image is static/images/hero-image.jpg, the value here should be "hero-image.jpg". If no hero image is desired, this can be left blank. Any image file can be used, but webp format is recommended for best performance. If a hero image is used, it will be displayed at the top of the homepage and will be styled to fit the full width of the screen while maintaining its aspect ratio. The image will also have a dark overlay to ensure that any text displayed on top of it remains legible.
    hero_image = "hero-image.webp"
  
  # Social media
  twitter = ''
  facebook = ''
  instagram = ''
  linkedin = ''
  
  # Contact
  email = 'contact@example.org'
  phone = ''
  
  # Features
  showReadingTime = true
  showShareButtons = true
  showDateUpdated = false
  
[taxonomies]
  category = 'categories'
  tag = 'tags'

[menu]
  [[menu.main]]
    identifier = 'home'
    name = 'Home'
    url = '/'
    pageRef = '/'
    weight = 1
  
  [[menu.main]]
    identifier = 'about'
    name = 'About'
    url = '/about/'
    pageRef = '/about'
    weight = 2
  
  [[menu.main]]
    identifier = 'blog'
    name = 'Blog'
    url = '/blog/'
    pageRef = '/blog'
    weight = 3
  
  [[menu.main]]
    identifier = 'contact'
    name = 'Contact'
    url = '/contact/'
    weight = 4

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = false
    lineNos = true
    lineNumbersInTable = true
    noClasses = true
    style = 'monokai'
    tabWidth = 4

[outputs]
  home = ['HTML', 'RSS', 'JSON']
  page = ['HTML']
  section = ['HTML', 'RSS']

[sitemap]
  changefreq = 'weekly'
  filename = 'sitemap.xml'
  priority = 0.5